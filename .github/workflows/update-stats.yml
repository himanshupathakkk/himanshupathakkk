name: Update GitHub Streak Stats

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours automatically
  workflow_dispatch:          # Allows manual trigger anytime

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to push the SVG back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest Streak Stats SVG
        run: |
          curl -o streak-stats.svg "https://streak-stats.demolab.com/?user=himanshupathakkk&theme=tokyonight&hide_border=true"

      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streak-stats.svg
          git diff --staged --quiet || git commit -m "chore: update streak stats"
          git push
